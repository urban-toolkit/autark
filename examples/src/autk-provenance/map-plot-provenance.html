<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Autark - Provenance (Map + Plot)</title>
  <link rel="stylesheet" href="/src/autk-provenance/map-plot-provenance.css">
</head>
<body>
  <div id="app">
    <header class="page-header">
      <h1>Map + Plot with Provenance</h1>
      <p>Interactions on map and plot are recorded as a navigable provenance trail.</p>
    </header>

    <div id="layout">
      <div id="analysisColumn">
        <section class="panel map-panel">
          <h2>Map View</h2>
          <div class="panel-body">
            <canvas></canvas>
          </div>
        </section>

        <section class="panel plot-panel">
          <h2>Scatterplot</h2>
          <div class="panel-body">
            <div id="plot">
              <div id="plotBody"></div>
            </div>
          </div>
        </section>
      </div>

      <aside id="sidebar" class="panel">
        <h2>Provenance Trail</h2>
        <div class="session-actions">
          <button id="exportBtn">Export Session</button>
          <button id="importBtn">Import Session</button>
          <input id="importFile" type="file" accept=".json" hidden />
        </div>
        <div class="panel-body">
          <div id="provenanceTrail"></div>
        </div>
      </aside>
    </div>
  </div>
</body>
<script type="module" src="/src/autk-provenance/map-plot-provenance.ts"></script>
</html>
